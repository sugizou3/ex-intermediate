<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .no-bullet {
        list-style: none; /* 点をなくす */
        padding-left: 0; /* 左の余白をなくす */
      }
    </style>
  </head>
  <body>
    <h1>野球チーム一覧</h1>
    <ul>
      <li class="no-bullet" th:each="team:${teams}">
        <a
          href="/team-detail.html"
          th:href="@{${'/team/detail?id='+team.id}}"
          th:text="${team.teamName}"
          >チーム名</a
        >
      </li>
    </ul>
  </body>
</html>
