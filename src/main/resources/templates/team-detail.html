<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div>
      <strong>球団名</strong><br /><span th:text="${team.teamName}"
        >読売ジャイアンツ</span
      >
    </div>
    <div>
      <strong>本拠地</strong><br /><span th:text="${team.headquarters}"
        >東京ドーム</span
      >
    </div>
    <div>
      <strong>発足</strong><br /><span th:text="${team.inauguration}"
        >1934年</span
      >
    </div>
    <div>
      <strong>歴史</strong><br /><pre
        th:text="${team.history}"
        >歴史</pre
      >
    </div>
    <button
      type="button"
      onclick="location.href = 'hotel-search.html'"
      th:onclick="|location.href='@{/team/}'|"
      class="button-style"
    >
      戻る
    </button>
  </body>
</html>
