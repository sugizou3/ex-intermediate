<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>衣類検索</h1>
    <form th:action="@{/cloth/form-post}" method="post">
      <div style="display: flex">
        <div>
          <input type="radio" name="gender" value="0" /><label for="0"
            >Man</label
          ><br />
          <input type="radio" name="gender" value="1" /><label for="1"
            >Woman</label
          >
        </div>
        <div>
          <select name="color">
            <option value="赤">赤</option>
            <option value="青">青</option>
            <option value="白">白</option>
            <option value="黄">黄</option>
          </select>
        </div>
      </div>
      <button>検索</button>
    </form>
    <hr>
    <div th:each="cloth:${clothes}">
        <table border="1">
            <tr><th>ジャンル</th><td th:text="${cloth.genre}"></td></tr>
            <tr><th>サイズ</th><td th:text="${cloth.size}"></td></tr>
            <tr><th>価格</th><td th:text="${cloth.price}"></td></tr>
        </table>
        <br>
    </div>
  </body>
</html>
