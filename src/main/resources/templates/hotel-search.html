<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<h1>ホテル検索</h1>
<form th:action="@{/hotel/form-post}" method="post">
    <div>
        <input type="text" name="price">円以下 <br>
        <button>検索</button>
    </div>
    <hr>
    <div th:if="${#lists.isEmpty(hotels)}"><span th:text="${price}"></span>円以下のホテル情報は存在しません</div>

    <div th:each="hotel:${hotels}">
        <table border="1">
            <tr>
                <th>ホテル名</th>
                <td th:text="${hotel.hotelName}"></td>
            </tr>
            <tr>
                <th>最寄り駅</th>
                <td th:text="${hotel.nearestStation}"></td>
            </tr>
            <tr>
                <th>価格</th>
                <td th:text="${hotel.price}"></td>
            </tr>
        </table>
        <br></div>

</form>
</body>
</html>
